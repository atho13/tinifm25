name: Frdmx luci-app-tinyfm

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: SNAPSHOT
            sdk_url: "https://downloads.openwrt.org"
            feeds_branch: ""
            artifact_ext: "apk"
            find_pattern: "luci-app-tinyfm*.apk"

          - name: 24.10.5
            sdk_url: "https://downloads.openwrt.org"
            feeds_branch: ";openwrt-24.10"
            artifact_ext: "ipk"
            find_pattern: "luci-app-tinyfm*.ipk"

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Extract version
      id: get_version
      run: |
        VERSION=$(grep PKG_VERSION luci-app-tinyfm/Makefile | sed 's/.*:=//' | tr -d ' ')
        RELEASE=$(grep PKG_RELEASE luci-app-tinyfm/Makefile | sed 's/.*:=//' | tr -d ' ')
        echo "version=${VERSION}-r${RELEASE}" >> $GITHUB_OUTPUT

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev \
          libssl-dev python3-distutils rsync unzip zlib1g-dev \
          file wget curl xz-utils zstd

    - name: Download & Extract SDK
      run: |
        wget -q "${{ matrix.sdk_url }}" -O sdk.tar.zst
        tar --use-compress-program=unzstd -xf sdk.tar.zst
        mv openwrt-sdk-* sdk

    - name: Prepare Feeds & Config
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        echo "CONFIG_PACKAGE_luci-app-tinyfm=m" >> .config
        make defconfig

    - name: Copy Package
      run: cp -r luci-app-tinyfm sdk/package/

    - name: Compile
      run: |
        cd sdk
        make package/luci-app-tinyfm/compile V=s -j$(nproc)

    - name: Locate Artifact
      run: |
        FILE=$(find sdk/bin/packages -name "${{ matrix.find_pattern }}" | head -n1)
        echo "ARTIFACT_PATH=$FILE" >> $GITHUB_ENV

    - name: Publish Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: ${{ env.ARTIFACT_PATH }}
