name: Build luci-app-tinyfm

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          # --- SESUAIKAN URL DI BAWAH INI DENGAN TARGET ROUTER ANDA ---
          - name: SNAPSHOT-arms-armv8
            sdk_url: "https://downloads.openwrt.org"
            artifact_ext: "apk"
            find_pattern: "luci-app-tinyfm*.apk"

          - name: 23.05.5-arms-armv8
            sdk_url: "https://downloads.openwrt.org"
            artifact_ext: "ipk"
            find_pattern: "luci-app-tinyfm*.ipk"

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev \
          libssl-dev python3-distutils rsync unzip zlib1g-dev \
          file wget curl xz-utils zstd

    - name: Download & Extract SDK
      run: |
        URL="${{ matrix.sdk_url }}"
        if [[ "$URL" == *".zst" ]]; then
          wget -q "$URL" -O sdk.tar.zst
          tar -I unzstd -xf sdk.tar.zst
        else
          wget -q "$URL" -O sdk.tar.xz
          tar -xf sdk.tar.xz
        fi
        rm -rf sdk
        mv openwrt-sdk-* sdk

    - name: Prepare Feeds & Copy Package
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        # Pastikan folder 'luci-app-tinyfm' ada di root repo Anda
        cp -r ../luci-app-tinyfm package/
        echo "CONFIG_PACKAGE_luci-app-tinyfm=m" >> .config
        make defconfig

    - name: Compile Package
      run: |
        cd sdk
        # Menggunakan V=s untuk melihat log detail jika terjadi error compile
        make package/luci-app-tinyfm/compile V=s -j$(nproc)

    - name: Locate Artifact
      id: locate
      run: |
        # Mencari file hasil compile (ipk/apk) di dalam folder bin SDK
        FILE_PATH=$(find sdk/bin/packages -name "${{ matrix.find_pattern }}" | head -n1)
        if [ -z "$FILE_PATH" ]; then
          echo "Error: Paket tidak ditemukan. Periksa log Compile Package di atas."
          exit 1
        fi
        echo "ARTIFACT_PATH=$FILE_PATH" >> $GITHUB_ENV
        echo "FILE_NAME=$(basename $FILE_PATH)" >> $GITHUB_ENV

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}-${{ env.FILE_NAME }}
        path: ${{ env.ARTIFACT_PATH }}

    - name: Publish Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.ARTIFACT_PATH }}
        generate_release_notes: true
