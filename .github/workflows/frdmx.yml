name: Build luci-app-tinyfm

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          #- name: SNAPSHOT
            #sdk_url: "https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
            #artifact_ext: "apk"
            #find_pattern: "luci-app-tinyfm*.apk"

          - name: 24.10.0
            sdk_url: "https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
            artifact_ext: "ipk"
            find_pattern: "luci-app-tinyfm*.ipk"

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Extract version
      id: get_version
      run: |
        # Mengambil versi dari folder luci-app-tinyfm
        VERSION=$(grep PKG_VERSION luci-app-tinyfm/Makefile | sed 's/.*:=//' | tr -d ' ')
        RELEASE=$(grep PKG_RELEASE luci-app-tinyfm/Makefile | sed 's/.*:=//' | tr -d ' ')
        echo "FULL_VERSION=${VERSION}-r${RELEASE}" >> $GITHUB_ENV

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev \
          libssl-dev python3-distutils rsync unzip zlib1g-dev \
          file wget curl xz-utils zstd

    - name: Download & Extract SDK
      run: |
        wget -q "${{ matrix.sdk_url }}" -O sdk.tar.zst
        tar --use-compress-program=unzstd -xf sdk.tar.zst
        EXTRACTED_DIR=$(ls -d openwrt-sdk-* | head -n1)
        mv "$EXTRACTED_DIR" sdk

    - name: Prepare Feeds
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        # Install dependensi PHP8 & LuCI
        ./scripts/feeds install php8 php8-cgi php8-fpm php8-mod-session \
          php8-mod-ctype php8-mod-fileinfo php8-mod-zip php8-mod-iconv \
          php8-mod-mbstring coreutils coreutils-stat zoneinfo-asia luci-base luci-compat

    - name: Copy Package Folder into SDK
      run: |
        # Salin folder luci-app-tinyfm ke dalam folder package SDK
        cp -r luci-app-tinyfm sdk/package/
        
        # Verifikasi keberadaan Makefile
        ls -l sdk/package/luci-app-tinyfm/Makefile

    - name: Compile Package
      run: |
        cd sdk
        # Update index paket agar folder manual terdeteksi
        ./scripts/feeds update -i
        
        echo "CONFIG_PACKAGE_luci-app-tinyfm=m" >> .config
        make defconfig
        
        # Mulai kompilasi
        make package/luci-app-tinyfm/compile V=s -j$(nproc)

    - name: Locate Artifact
      id: locate
      run: |
        FILE=$(find sdk/bin/packages -name "${{ matrix.find_pattern }}" | head -n1)
        if [ -z "$FILE" ]; then
          echo "ERROR: File tidak ditemukan!"
          find sdk/bin/packages -type f
          exit 1
        fi
        NEW_NAME="${{ matrix.name }}-$(basename $FILE)"
        mv "$FILE" "$NEW_NAME"
        echo "ARTIFACT_PATH=$NEW_NAME" >> $GITHUB_ENV

    - name: Publish to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest-build' }}
        name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Build' }}
        body: |
          Build otomatis untuk **luci-app-tinyfm**.
          Versi Paket: `${{ env.FULL_VERSION }}`
        files: ${{ env.ARTIFACT_PATH }}
        allow_updates: true
